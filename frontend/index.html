<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>AI Resume Analyzer</h2>
        <p>Upload your resume and select a job role to get an ATS compatibility score and skill analysis.</p>
        
        <form id="uploadForm">
            <div class="form-group">
                <label for="resume">Resume File (PDF or DOCX):</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.docx" required>
            </div>
            
            <div class="form-group">
                <label for="role">Job Role:</label>
                <select id="role" name="role" required>
                    <option value="">Select a role</option>
                    <option value="ml_engineer">ML Engineer</option>
                    <option value="web_dev">Web Developer</option>
                    <option value="data_scientist">Data Scientist</option>
                    <option value="backend_dev">Backend Developer</option>
                    <option value="devops">DevOps Engineer</option>
                </select>
            </div>
            
            <button type="submit">Analyze Resume</button>
        </form>
        
        <div id="loading" style="display: none;">Analyzing your resume...</div>
        
        <div id="output"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const loading = document.getElementById('loading');
            const output = document.getElementById('output');
            
            loading.style.display = 'block';
            output.innerHTML = '';
            
            try {
                const response = await fetch('http://127.0.0.1:5000/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    output.innerHTML = `
                        <h3>Analysis Results</h3>
                        <p><strong>ATS Score:</strong> ${result.score}%</p>
                        <p><strong>Extracted Skills:</strong> ${result.skills.join(', ')}</p>
                        <p><strong>Missing Skills:</strong> ${result.missing_skills.join(', ')}</p>
                    `;
                } else {
                    output.innerHTML = `<p style="color: red;">Error: ${result.error}</p>`;
                }
            } catch (error) {
                output.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
